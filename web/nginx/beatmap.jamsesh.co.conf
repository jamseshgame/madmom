server {
    listen 80;
    server_name beatmap.jamsesh.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name beatmap.jamsesh.co;

    ssl_certificate /etc/letsencrypt/live/beatmap.jamsesh.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beatmap.jamsesh.co/privkey.pem;

    client_max_body_size 200M;

    # Frontend static files
    root /opt/madmom/web/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }
}
